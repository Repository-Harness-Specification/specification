spec: repository-harness/0.2

repository:
  name: minimal-example
  description: Minimal example of repository-defined, path-aware context routing

entrypoint: AGENTS.md

routing:
  strategy: first-match
  on_no_match: report

documents:
  - id: architecture
    path: .harness/ARCHITECTURE.md
    purpose: Architectural boundaries and dependency rules

  - id: bootstrap
    path: .harness/BOOTSTRAP.md
    purpose: Toolchain preparation and environment diagnostics

  - id: validation
    path: .harness/VALIDATION.md
    purpose: Automated and manual validation expectations

  - id: workflows
    path: .harness/WORKFLOWS.md
    purpose: Implementation and regression-fix workflow guidance

concerns:
  - id: source-change
    description: A change to implementation or test behavior
    signals:
      - The task modifies files under src or tests
      - The task changes observable runtime behavior

  - id: architecture-boundary
    description: A change to module ownership or dependency direction
    signals:
      - A new dependency is introduced
      - Responsibility moves between modules or layers
      - A public boundary or composition root changes

  - id: environment-setup
    description: Local toolchain setup or environment diagnosis
    signals:
      - A required executable is missing
      - Bootstrap or dependency installation fails

  - id: documentation-change
    description: A change limited to human-readable documentation
    signals:
      - Candidate paths contain only Markdown documentation

commands:
  - id: validate
    run: ./.harness/scripts/validate.sh
    description: Run the repository's complete automated validation
    mutates: false
    requires_approval: false
    availability:
      executables:
        - sh
      on_unavailable: report

routes:
  - id: environment-diagnosis
    description: Prepare or diagnose the local development environment
    match:
      concerns:
        any:
          - environment-setup
    context:
      required:
        - bootstrap
      conditional:
        - document: validation
          when:
            paths:
              any:
                - .harness/scripts/**
          reason: Load validation expectations only when diagnosing validation scripts
    validation:
      required: []
      conditional: []

  - id: architecture-change
    description: Change module ownership, dependencies, or architectural boundaries
    match:
      concerns:
        any:
          - architecture-boundary
    context:
      required:
        - architecture
        - workflows
      conditional:
        - document: validation
          when:
            paths:
              any:
                - src/**
                - tests/**
          reason: Load validation expectations when architecture work changes source or tests
    validation:
      required:
        - validate
      conditional: []

  - id: source-change
    description: Change implementation or tests without an architectural boundary change
    match:
      concerns:
        any:
          - source-change
      paths:
        any:
          - src/**
          - tests/**
    context:
      required:
        - workflows
      conditional:
        - document: architecture
          when:
            paths:
              any:
                - src/**/Architecture/**
                - src/**/Composition/**
          reason: Load architecture rules only after candidate paths reach an architectural boundary
        - document: bootstrap
          when:
            concerns:
              any:
                - environment-setup
          reason: Load bootstrap guidance only after an environment problem appears
    validation:
      required:
        - validate
      conditional: []

  - id: documentation-only
    description: Change documentation without modifying implementation or test behavior
    match:
      concerns:
        any:
          - documentation-change
      paths:
        any:
          - "**/*.md"
    context:
      required: []
      conditional:
        - document: architecture
          when:
            paths:
              any:
                - docs/architecture/**
                - .harness/ARCHITECTURE.md
          reason: Load architecture guidance only when architecture documentation changes
    validation:
      required:
        - validate
      conditional: []
