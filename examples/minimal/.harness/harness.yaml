spec: repository-harness/0.2

repository:
  name: minimal-example
  description: Minimal path-aware context routing example

entrypoint: AGENTS.md

routing:
  strategy: first-match
  on_no_match: report

documents:
  - id: architecture
    path: .harness/ARCHITECTURE.md
    purpose: Architectural boundaries and dependency rules

  - id: bootstrap
    path: .harness/BOOTSTRAP.md
    purpose: Toolchain preparation and environment diagnostics

  - id: workflows
    path: .harness/WORKFLOWS.md
    purpose: Implementation and regression workflow guidance

scopes:
  - id: source
    paths:
      - src/**
      - tests/**
      - "**/*.csproj"

  - id: architecture-boundary
    paths:
      - src/**/Composition/**
      - "**/*.csproj"

concerns:
  - id: environment-setup
    description: Toolchain setup or environment diagnosis

commands:
  - id: validate
    run: ./.harness/scripts/validate.sh
    description: Run automated repository validation
    availability:
      executables:
        - sh
      on_unavailable: report

validation_rules:
  - match:
      scopes:
        any:
          - source
    commands:
      - validate

routes:
  - id: environment-diagnosis
    description: Prepare or diagnose the local environment
    match:
      concerns:
        any:
          - environment-setup
    context:
      required:
        - bootstrap

  - id: source-change
    description: Change implementation, tests, or project dependencies
    match:
      scopes:
        any:
          - source
    context:
      required:
        - workflows
      conditional:
        - document: architecture
          when:
            scopes:
              any:
                - architecture-boundary
