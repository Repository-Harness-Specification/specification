name: Specification or example bug
description: Report an inconsistency, broken example, or incorrect requirement
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is incorrect or inconsistent?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link to the section, schema field, or example.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
